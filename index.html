<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>岁华纪丽 · 姥爷陪伴空间</title>
    <script src="https://fastly.jsdelivr.net/npm/lunar-javascript/lunar.js" async></script>
    
    <!-- Umami 网站访客追踪代码 -->
    <script defer src="https://cloud.umami.is/script.js" data-website-id="e44967db-2f0d-4e38-9f58-54ef8cbf3423"></script>
    
    <style>
        :root {
            /* 白昼主题：动漫唯美晴空与海滩 */
            --bg-gradient: linear-gradient(180deg, #134E9B 0%, #3B82C4 35%, #76B4DF 70%, #BFE2F2 100%);
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255, 255, 255, 0.6);
            --text-main: #0B2545;
            --text-sub: #3A5A78;
            --accent: #E27B58;
            --shadow: rgba(19, 78, 155, 0.15);
            --progress-bg: rgba(255, 255, 255, 0.4);
            --holiday-title: #D35400;
            --badge-myhome: #2D9CDB;
            --badge-yihome: #9B51E0;

            /* 插画白昼色彩 */
            --svg-sky-top: #2B76BC; --svg-sky-btm: #8FC9E9; --svg-sun: #FFD166;
            --svg-mnt-back: #6FA4C7; --svg-mnt-front: #4A86AE;
            --svg-tree: #2B6955; --svg-silhouette: #1F3F5E;
            --svg-star: rgba(255, 255, 255, 0); 
        }

        body.night-mode {
            /* 夜间主题：深邃星空 */
            --bg-gradient: linear-gradient(135deg, #0D111A 0%, #151C2A 50%, #1E1F36 100%);
            --glass-bg: rgba(28, 33, 46, 0.85);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #FFFFFF;
            --text-sub: #A1A1AA;
            --accent: #FBBF24;
            --shadow: rgba(0, 0, 0, 0.6);
            --progress-bg: rgba(255, 255, 255, 0.1);
            --holiday-title: #F59E0B;
            --badge-myhome: #10B981;
            --badge-yihome: #3B82F6;

            /* 插画夜间色彩 */
            --svg-sky-top: #0D111A; --svg-sky-btm: #151C2A; --svg-sun: #FDE047;
            --svg-mnt-back: #263145; --svg-mnt-front: #1E293B;
            --svg-tree: #0F3B36; --svg-silhouette: #CBD5E1;
            --svg-star: rgba(255, 255, 255, 0.8);
        }

        /* 春节覆盖主题 */
        body.theme-spring {
            --bg-gradient: linear-gradient(135deg, #3A0B0B 0%, #5E1414 50%, #2A0808 100%);
            --glass-bg: rgba(60, 15, 15, 0.9);
            --accent: #FFD700; --text-main: #FFF8E7; --text-sub: #FCD5B5;
            --svg-sky-top: #4A0E0E; --svg-sky-btm: #2D0808; --svg-sun: #FF4500;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; transition: background 0.8s ease, color 0.8s ease, fill 0.8s ease; }
        body { background: var(--bg-gradient); color: var(--text-main); min-height: 100vh; overflow-x: hidden; }
        #bgCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        .container { width: 100%; max-width: 520px; margin: 0 auto; padding: 24px 20px; position: relative; z-index: 1; padding-bottom: 80px; }

        /* 右上角悬浮黑胶唱片音乐按钮：优化为圆形带中心孔，旋转效果 */
        .music-floating-btn { 
            position: fixed; top: 20px; right: 20px; 
            width: 48px; height: 48px; border-radius: 50%; 
            background: var(--glass-bg); 
            border: 2px solid var(--glass-border); 
            box-shadow: 0 4px 15px var(--shadow); 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; z-index: 1000; 
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); 
            transform-origin: center center;
            transition: transform 0.2s ease;
        }
        /* 黑胶唱片中心孔模拟 */
        .music-floating-btn::before { 
            content: ''; position: absolute; 
            width: 14px; height: 14px; 
            background: rgba(255,255,255,0.5); 
            border-radius: 50%; border: 1px solid rgba(0,0,0,0.1); 
            z-index: 1; 
        }
        .music-node { font-size: 20px; display: inline-block; z-index: 2; position: relative; margin-left: 2px; }
        
        /* 整盘旋转动画 */
        @keyframes spinAround { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .music-playing { animation: spinAround 4.5s linear infinite; }

        /* 头部 Header */
        header { text-align: center; margin-bottom: 24px; padding-top: 10px; padding-right: 40px; }
        header h1 { font-size: 26px; font-weight: 700; letter-spacing: 2px; margin-bottom: 6px; }
        header p { font-size: 14px; color: var(--text-sub); }
        .lunar-badge { display: inline-block; background: var(--glass-bg); padding: 6px 16px; border-radius: 20px; font-size: 13px; font-weight: 600; margin-top: 10px; color: var(--accent); border: 1px solid var(--glass-border); box-shadow: 0 4px 12px var(--shadow); }

        .glass-card { background: var(--glass-bg); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid var(--glass-border); border-radius: 24px; padding: 24px; box-shadow: 0 10px 30px var(--shadow); margin-bottom: 20px; position: relative; overflow: hidden; }

        /* SVG 生命感插画 */
        .hero-card { padding: 0; border: none; box-shadow: 0 12px 30px var(--shadow); background: transparent; }
        @keyframes breatheSilhouette { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(1.5px); } }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; transform: scale(1.2); } }
        .anim-star { animation: twinkle 4s ease-in-out infinite; fill: var(--svg-star); }
        .anim-breathe { animation: breatheSilhouette 4s ease-in-out infinite; }

        /* 语录卡片 */
        .quote-card { text-align: center; padding: 20px; }
        .quote-content { font-size: 15px; line-height: 1.6; font-weight: 600; color: var(--text-main); margin-bottom: 12px; min-height: 48px; display: flex; align-items: center; justify-content: center; }
        .quote-refresh-btn { background: none; border: none; color: var(--accent); font-size: 13px; font-weight: 700; cursor: pointer; display: inline-flex; align-items: center; gap: 4px; }

        /* 天气与统计卡片 */
        .weather-grid { display: flex; align-items: center; justify-content: space-between; }
        .weather-left { display: flex; flex-direction: column; gap: 4px; }
        .weather-city { font-size: 13px; color: var(--text-sub); display: flex; align-items: center; gap: 4px; }
        .weather-temp { font-size: 44px; font-weight: 700; font-variant-numeric: tabular-nums; display: flex; align-items: flex-start; line-height: 1; color: var(--text-main); }
        .weather-temp span { font-size: 20px; margin-top: 4px; font-weight: 500; }
        .weather-desc { font-size: 16px; font-weight: 600; color: var(--accent); margin-top: 2px;}
        .weather-right { display: flex; flex-direction: column; gap: 8px; align-items: flex-end; }
        .weather-badge { background: var(--progress-bg); padding: 5px 12px; border-radius: 12px; font-size: 12px; font-weight: 600; color: var(--text-main); }
        .health-advice { margin-top: 14px; padding: 12px; border-radius: 14px; background: rgba(226,123,88,0.06); font-size: 13px; line-height: 1.5; color: var(--text-main); font-weight: 500; display: flex; gap: 6px; }
        body.night-mode .health-advice { background: rgba(255,255,255,0.04); }

        /* 心情打卡样式 */
        .mood-container { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        .mood-title { font-size: 14px; font-weight: 600; color: var(--text-sub); }
        .mood-options { display: flex; gap: 8px; }
        .mood-btn { background: var(--progress-bg); border: 1px solid var(--glass-border); padding: 6px 14px; border-radius: 14px; font-size: 14px; cursor: pointer; font-weight: bold; transition: all 0.2s; display: flex; align-items: center; gap: 4px; color: var(--text-main); }
        .mood-btn:active { transform: scale(0.93); }
        .mood-btn.selected { background: var(--accent); color: #fff; border-color: var(--accent); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .mood-result-text { font-size: 14px; font-weight: 700; color: var(--accent); }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
        .stat-item { background: rgba(255,255,255,0.4); padding: 18px; border-radius: 20px; display: flex; flex-direction: column; justify-content: center; position: relative; }
        body.night-mode .stat-item { background: rgba(255,255,255,0.05); }
        .stat-title { font-size: 13px; color: var(--text-sub); margin-bottom: 8px; font-weight: 600; }
        .stat-value { font-size: 30px; font-weight: 700; color: var(--text-main); display: flex; align-items: baseline; gap: 4px; }
        .stat-unit { font-size: 13px; font-weight: normal; color: var(--text-sub); }
        
        .circle-progress-wrap { position: absolute; right: -15px; bottom: -15px; width: 80px; height: 80px; opacity: 0.15; transform: rotate(-90deg); }
        .circle-bg { fill: none; stroke: var(--text-sub); stroke-width: 8; }
        .circle-fill { fill: none; stroke: var(--accent); stroke-width: 8; stroke-dasharray: 200; stroke-dashoffset: 200; transition: stroke-dashoffset 2s cubic-bezier(0.4, 0, 0.2, 1); }

        /* 倒计时 */
        .status-card { text-align: center; }
        .location-badge { display: inline-block; background: var(--accent); color: #ffffff; padding: 8px 24px; border-radius: 24px; font-size: 16px; font-weight: 700; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.15); letter-spacing: 1px;}
        .countdown-time { font-size: 24px; font-weight: 700; display: flex; justify-content: center; gap: 8px; margin-bottom: 24px; }
        .time-box { display: flex; flex-direction: column; align-items: center; background: var(--progress-bg); padding: 6px 12px; border-radius: 12px; min-width: 56px; }
        .time-num { font-size: 30px; font-variant-numeric: tabular-nums; color: var(--text-main); }
        .time-label { font-size: 12px; color: var(--text-sub); font-weight: 600; margin-top: 4px; }
        .progress-header { display: flex; justify-content: space-between; font-size: 13px; color: var(--text-sub); margin-bottom: 8px; font-weight: 600; }
        .progress-bar-bg { width: 100%; height: 10px; background: var(--progress-bg); border-radius: 10px; overflow: hidden; }
        .progress-bar-fill { height: 100%; background: var(--accent); border-radius: 10px; width: 0%; transition: width 1s ease-out; }

        /* 按钮与交互区 */
        .interaction-area { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 24px; }
        .btn { background: var(--accent); color: #fff; border: none; padding: 14px 16px; border-radius: 16px; font-size: 15px; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 6px; font-weight: 600; box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: all 0.2s; flex: 1 1 100%; }
        .btn:active { transform: scale(0.97); }
        .btn-half { flex: 1; } 
        .btn-outline { background: var(--glass-bg); border: 1.5px solid var(--accent); color: var(--text-main); box-shadow: none; }
        body.night-mode .btn-outline { background: transparent; }
        
        /* 折叠面板 (排班、节日、日记) */
        .timeline-section { padding: 0; }
        .timeline-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 24px; cursor: pointer; font-weight: 700; font-size: 16px; }
        .timeline-content { max-height: 0; overflow: hidden; transition: max-height 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        .timeline-content.expanded { max-height: 20000px; }
        .timeline-list { padding: 0 24px 20px 24px; }
        .timeline-item { display: flex; align-items: center; padding: 16px 0; border-bottom: 1px dashed var(--glass-border); }
        .timeline-item:last-child { border-bottom: none; }
        .tl-text { flex: 1; font-size: 15px; display: flex; flex-direction: column; gap: 6px; font-weight: 600; }
        .tl-sub { font-size: 13px; color: var(--text-sub); font-weight: 500; }
        .tl-loc { font-size: 13px; padding: 5px 14px; border-radius: 12px; font-weight: 700; color: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .loc-myhome { background: var(--badge-myhome); }
        .loc-yihome { background: var(--badge-yihome); }

        /* 日记本样式 */
        .diary-input { width: 100%; height: 80px; border-radius: 12px; padding: 12px; border: 1px solid var(--glass-border); background: var(--progress-bg); color: var(--text-main); margin-bottom: 12px; resize: none; font-size: 14px; font-family: inherit; }
        .diary-input::placeholder { color: var(--text-sub); }
        .diary-entry { padding: 12px; border-bottom: 1px dashed var(--glass-border); margin-bottom: 8px; border-radius: 8px; background: rgba(0,0,0,0.03); }
        body.night-mode .diary-entry { background: rgba(255,255,255,0.05); }

        .toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0, 0, 0, 0.8); color: #fff; padding: 14px 28px; border-radius: 20px; font-size: 15px; font-weight: 600; z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.3s; backdrop-filter: blur(10px); }
        .toast.show { opacity: 1; }
        audio { display: none; }
    </style>
</head>
<body>

    <canvas id="bgCanvas"></canvas>
    <div id="toast" class="toast"></div>

    <div class="music-floating-btn" id="musicFloatingBtn" onclick="toggleMusic()">
        <span class="music-node">🎵</span>
    </div>

    <div class="container">
        <header>
            <h1>姥爷陪伴空间</h1>
            <p id="greetingText">岁华纪丽，温情常伴</p>
            <div class="lunar-badge" id="currentLunarText">测算中...</div>
        </header>

        <div class="glass-card hero-card">
            <svg viewBox="0 0 500 240" xmlns="http://www.w3.org/2000/svg" style="width:100%; display:block; border-radius: 24px;">
                <defs>
                    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" stop-color="var(--svg-sky-top)" stop-opacity="0.6"/>
                        <stop offset="100%" stop-color="var(--svg-sky-btm)" stop-opacity="0.3"/>
                    </linearGradient>
                </defs>
                <rect width="100%" height="100%" fill="url(#skyGrad)" />
                
                <circle cx="80" cy="50" r="1.5" class="anim-star" style="animation-delay: 0s;"/>
                <circle cx="200" cy="80" r="2" class="anim-star" style="animation-delay: 1.2s;"/>
                <circle cx="380" cy="40" r="1.5" class="anim-star" style="animation-delay: 0.5s;"/>
                <circle cx="450" cy="90" r="2" class="anim-star" style="animation-delay: 1.8s;"/>
                <circle cx="400" cy="80" r="38" fill="var(--svg-sun)" />

                <path d="M-20,180 C100,130 250,170 520,130 L520,240 L-20,240 Z" fill="var(--svg-mnt-back)" />
                <path d="M-20,210 C150,160 300,210 520,170 L520,240 L-20,240 Z" fill="var(--svg-mnt-front)" />

                <path d="M0,0 Q60,20 80,80 Q50,90 0,30 Z" fill="var(--svg-tree)"/>
                <path d="M0,0 Q100,-10 140,50 Q100,60 0,10 Z" fill="var(--svg-tree)"/>

                <g class="anim-breathe">
                    <g transform="translate(130, 145)">
                        <circle cx="35" cy="50" r="22" fill="none" stroke="var(--svg-silhouette)" stroke-width="3"/>
                        <circle cx="35" cy="50" r="16" fill="none" stroke="var(--svg-silhouette)" stroke-width="0.8"/>
                        <circle cx="78" cy="65" r="7" fill="var(--svg-silhouette)"/>
                        <path d="M60,60 L78,65 L85,65" stroke="var(--svg-silhouette)" stroke-width="3" fill="none" stroke-linecap="round"/>
                        <path d="M15,50 L25,25 L55,25 L65,60" stroke="var(--svg-silhouette)" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M25,25 L18,5" stroke="var(--svg-silhouette)" stroke-width="4" fill="none" stroke-linecap="round"/>
                        <path d="M20,25 L30,12 L50,12 L55,25" stroke="var(--svg-silhouette)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                    </g>
                    <g transform="translate(130, 145)">
                        <circle cx="35" cy="-8" r="8" fill="var(--svg-silhouette)"/>
                        <path d="M30,-1 C20,10 20,25 35,25 L50,25 C45,15 42,5 37,-1 Z" fill="var(--svg-silhouette)"/>
                        <path d="M48,25 C55,25 60,35 60,45 L75,60" stroke="var(--svg-silhouette)" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M36,5 C40,10 46,12 48,12" stroke="var(--svg-silhouette)" stroke-width="5" fill="none" stroke-linecap="round"/>
                    </g>
                    <g transform="translate(205, 115)">
                        <circle cx="15" cy="10" r="9" fill="var(--svg-silhouette)"/> 
                        <path d="M12,19 C20,19 25,35 22,50 L10,100 L0,100 L12,50 L8,19 Z" fill="var(--svg-silhouette)"/> 
                        <path d="M15,25 C5,35 -5,40 -12,42" stroke="var(--svg-silhouette)" stroke-width="5" fill="none" stroke-linecap="round"/>
                    </g>
                    <g transform="translate(90, 100)">
                        <circle cx="20" cy="12" r="9.5" fill="var(--svg-silhouette)"/> 
                        <path d="M15,22 C30,22 35,40 32,60 L20,115 L8,115 L20,60 L10,22 Z" fill="var(--svg-silhouette)"/> 
                        <path d="M22,25 C30,35 45,45 52,50" stroke="var(--svg-silhouette)" stroke-width="6" fill="none" stroke-linecap="round"/>
                    </g>
                    <g transform="translate(55, 110)">
                        <circle cx="18" cy="12" r="8.5" fill="var(--svg-silhouette)"/> 
                        <path d="M12,21 C22,21 28,35 25,60 L30,105 L10,105 L15,60 L8,21 Z" fill="var(--svg-silhouette)"/> 
                        <path d="M20,25 C25,35 28,45 26,55" stroke="var(--svg-silhouette)" stroke-width="4.5" fill="none" stroke-linecap="round"/>
                    </g>
                </g>
            </svg>
        </div>

        <div class="glass-card quote-card">
            <div class="quote-content" id="quoteText">正在为您翻开温暖篇章...</div>
            <button class="quote-refresh-btn" onclick="shuffleQuote()">🔄 换一句</button>
        </div>

        <div class="glass-card weather-card">
            <div class="weather-grid">
                <div class="weather-left">
                    <div class="weather-city">📍 山东·济南 (实时监测)</div>
                    <div class="weather-temp" id="wtTemp">--<span>℃</span></div>
                    <div class="weather-desc" id="wtDesc">获取天气中...</div>
                </div>
                <div class="weather-right">
                    <div class="weather-badge" id="wtAqi">空气: 测算中</div>
                    <div class="weather-badge" id="wtWind">风力: --</div>
                    <div class="weather-badge" id="wtHum">湿度: --</div>
                </div>
            </div>
            <div class="health-advice" id="wtAdvice">
                <span>💬</span> <span id="wtAdviceText">正在生成今日天气健康嘱托...</span>
            </div>
        </div>

        <div class="glass-card">
            <div class="mood-container">
                <span class="mood-title" id="moodPrompt">记录今日陪伴心情：</span>
                <div class="mood-options" id="moodBtnZone">
                    <button class="mood-btn" onclick="submitMood('😊 开心')">😊 开心</button>
                    <button class="mood-btn" onclick="submitMood('🤍 温暖')">🤍 温暖</button>
                    <button class="mood-btn" onclick="submitMood('🕊 平安')">🕊 平安</button>
                </div>
                <div class="mood-result-text" id="moodResultZone" style="display:none;"></div>
            </div>
        </div>

        <div class="stats-grid">
            <div class="glass-card stat-item">
                <div class="stat-title">累计陪伴日</div>
                <div class="stat-value"><span id="statDays">0</span><span class="stat-unit">天</span></div>
                <svg class="circle-progress-wrap" viewBox="0 0 100 100">
                    <circle class="circle-bg" cx="50" cy="50" r="40"></circle>
                    <circle class="circle-fill" cx="50" cy="50" r="40" id="circleDays"></circle>
                </svg>
            </div>
            <div class="glass-card stat-item">
                <div class="stat-title">共度佳节数</div>
                <div class="stat-value"><span id="statFests">0</span><span class="stat-unit">次</span></div>
                <svg class="circle-progress-wrap" viewBox="0 0 100 100">
                    <circle class="circle-bg" cx="50" cy="50" r="40"></circle>
                    <circle class="circle-fill" cx="50" cy="50" r="40" id="circleFests"></circle>
                </svg>
            </div>
        </div>

        <div class="glass-card status-card">
            <div class="location-badge" id="currentLocationBadge">环境载入中...</div>
            <div class="countdown-title" id="countdownTitle">距离下次轮换还有</div>
            <div class="countdown-time">
                <div class="time-box"><span class="time-num" id="d">00</span><span class="time-label">天</span></div>
                <div class="time-box" style="background:transparent; padding:0; min-width:auto; justify-content:center; color:var(--accent); font-weight:bold;">:</div>
                <div class="time-box"><span class="time-num" id="h">00</span><span class="time-label">时</span></div>
                <div class="time-box" style="background:transparent; padding:0; min-width:auto; justify-content:center; color:var(--accent); font-weight:bold;">:</div>
                <div class="time-box"><span class="time-num" id="m">00</span><span class="time-label">分</span></div>
                <div class="time-box" style="background:transparent; padding:0; min-width:auto; justify-content:center; color:var(--accent); font-weight:bold;">:</div>
                <div class="time-box"><span class="time-num" id="s">00</span><span class="time-label">秒</span></div>
            </div>
            <div class="progress-header">
                <span>当月轮换进度</span><span id="progressText">0%</span>
            </div>

        <!-- 将音频链接修改为了相对路径 ./music.mp3 -->

    <script>
        const IS_MY_HOME_EVEN_MONTH = false; 
        const PROJECT_START_DATE = new Date("2018-09-01"); 
        let manualThemeOverride = null;

        // 内置 30 条温暖温情语录
        const companionQuotes = [
            "树欲静而风不止，子欲养而亲犹在，便是这世间最大的幸福。",

            "平淡日子里的每一次围坐唠嗑，都是时光最温存的馈赠。",

            "岁月不声不响，却把最珍贵的温情留在了我们身旁。",
            "陪伴是一首写不完的诗，字里行间全是一家人的平安喜乐。",
            "把每一天平凡的陪伴，都过成往后岁月里最闪亮的回忆。",
            "听听长辈过去的那些陈年往事，那是一代人的光阴故事。",
            "平安顺遂，喜乐安康。你的常在，就是他最大的宽慰。",
            "唠叨是爱的另一种表达，珍惜每一次耳边的关切与叮嘱。",
            "岁月带走了他的青春，却带不走他守望我们的温柔目光。",
            "愿阳光落满小院，愿长辈无忧无疾，岁岁年年皆无恙。",
            "你宽阔的肩膀，如今也是他最坚实、最安心的依靠。",
            "陪伴不需要惊天动地，只是每个清晨傍晚的相守。",
            "给长辈多一点耐心，就像他们曾经笨拙而细心地养育我们一样。",
            "时光温柔，愿长辈笑容常在，身体康健，福寿绵长。",
            "爱是双向的奔赴，跨越岁月的沟壑，依旧温暖如初。",
            "每一声叮嘱，每一顿家常便饭，都是最纯粹的幸福。",
            "岁月漫长，唯有家人的爱与陪伴，能抵御万般风霜。",
            "看着长辈吃得香、睡得稳，便是做晚辈最心安的时刻。",
            "留一束阳光在手心，送一份安康给长辈，今天也是温馨的一天。",
            "岁月向晚，韶华不负。愿长辈被岁月温柔以待，福泽常伴。"
        ];

        function getLocationByLunarMonth(monthNum) {
            const isEven = (Math.abs(monthNum) % 2 === 0);
            return IS_MY_HOME_EVEN_MONTH ? (isEven ? "我家" : "姨家") : (isEven ? "姨家" : "我家");
        }

        function getLocationForAnyDate(lunarObj) {
            let m = lunarObj.getMonth();
            if (lunarObj.getDay() < 16) m = lunarObj.next(-lunarObj.getDay()).getMonth();
            return getLocationByLunarMonth(m);
        }

        const els = {
            d: document.getElementById('d'), h: document.getElementById('h'), m: document.getElementById('m'), s: document.getElementById('s'),
            title: document.getElementById('countdownTitle'), badge: document.getElementById('currentLocationBadge'),
            lunarText: document.getElementById('currentLunarText'), progBar: document.getElementById('progressBar'), progText: document.getElementById('progressText')
        };

        let currentTheme = 'default';

        function bootSystem() {
            if (typeof Lunar !== 'undefined') {
                updateTimeLoop(); setInterval(updateTimeLoop, 1000);
                generateTimeline(); generateHolidays(); initStats(); fetchJinanWeather(); checkHolidayTheme(); renderDiary(); initQuoteModule(); renderMoodModule();
            } else { setTimeout(bootSystem, 100); }
        }

        function initQuoteModule() {
            const now = new Date();
            const seed = now.getFullYear() * 10000 + (now.getMonth() + 1) * 100 + now.getDate();
            const initialIdx = seed % companionQuotes.length;
            document.getElementById('quoteText').innerText = companionQuotes[initialIdx];
        }

        function shuffleQuote() {
            const randIdx = Math.floor(Math.random() * companionQuotes.length);
            document.getElementById('quoteText').innerText = companionQuotes[randIdx];
            triggerToast('已为您挑选下一句温馨语录 ✨');
        }

        function getTodayKey() {
            const now = new Date();
            return `${now.getFullYear()}-${now.getMonth() + 1}-${now.getDate()}`;
        }

        function submitMood(mood) {
            const key = getTodayKey();
            let data = JSON.parse(localStorage.getItem('companion_mood_records') || '{}');
            if (data[key]) {
                triggerToast('今天已经打过卡啦，明天再记录吧');
                return;
            }
            data[key] = mood;
            localStorage.setItem('companion_mood_records', JSON.stringify(data));
            renderMoodModule();
            triggerToast(`打卡成功：今日陪伴心情为 ${mood} 🤍`);
        }

        function renderMoodModule() {
            const key = getTodayKey();
            const data = JSON.parse(localStorage.getItem('companion_mood_records') || '{}');
            const checkedMood = data[key];
            const btnZone = document.getElementById('moodBtnZone');
            const resZone = document.getElementById('moodResultZone');
            if (checkedMood) {
                btnZone.style.display = 'none';
                resZone.style.display = 'block';
                resZone.innerHTML = `今日心情状态：<strong>${checkedMood}</strong>`;
            } else {
                btnZone.style.display = 'flex';
                resZone.style.display = 'none';
            }
        }

        function checkHolidayTheme() {
            const l = Lunar.fromDate(new Date());
            const fests = [...l.getFestivals(), ...l.getSolar().getFestivals()];
            const body = document.body;
            if (fests.includes("春节") || fests.includes("除夕") || (l.getMonth() === 1 && l.getDay() <= 3)) {
                body.className = body.className.replace(/theme-\w+/g, ''); body.classList.add('theme-spring'); currentTheme = 'spring';
            } else {
                body.className = body.className.replace(/theme-\w+/g, ''); currentTheme = 'default';
            }
        }

        function updateTimeLoop() {
            const now = new Date();
            const lunarNow = Lunar.fromDate(now);
            
            const hour = now.getHours();
            let targetNight = (hour >= 18 || hour < 6);
            if (manualThemeOverride === 'day') targetNight = false;
            if (manualThemeOverride === 'night') targetNight = true;

            if (targetNight && currentTheme === 'default') document.body.classList.add('night-mode');
            else document.body.classList.remove('night-mode');
            setCanvasTimeMode(targetNight);

            els.lunarText.innerText = `${lunarNow.getYearInGanZhi()}年 农历 ${lunarNow.getMonthInChinese()}月 ${lunarNow.getDayInChinese()}`;

            let startCursor = Lunar.fromDate(now);
            if (startCursor.getDay() !== 16) { while (startCursor.getDay() !== 16) startCursor = startCursor.next(-1); }
            let targetCursor = Lunar.fromDate(now).next(1); 
            while (targetCursor.getDay() !== 16) targetCursor = targetCursor.next(1);

            const currentLoc = getLocationByLunarMonth(startCursor.getMonth());
            els.badge.innerText = `🏡 本月姥爷长住：${currentLoc}`;

            const tSolar = targetCursor.getSolar();
            els.title.innerText = (currentLoc === "我家") ? `距离启程去姨家 (${tSolar.getMonth()}月${tSolar.getDay()}日) 还有` : `距离阖家盼归我家 (${tSolar.getMonth()}月${tSolar.getDay()}日) 还有`;

            const targetDate = new Date(tSolar.getYear(), tSolar.getMonth() - 1, tSolar.getDay(), 0, 0, 0);
            const startDate = new Date(startCursor.getSolar().getYear(), startCursor.getSolar().getMonth() - 1, startCursor.getSolar().getDay(), 0, 0, 0);
            
            const diff = targetDate - now;
            if (diff > 0) {
                els.d.innerText = Math.floor(diff / 86400000).toString().padStart(2, '0');
                els.h.innerText = Math.floor((diff / 3600000) % 24).toString().padStart(2, '0');
                els.m.innerText = Math.floor((diff / 60000) % 60).toString().padStart(2, '0');
                els.s.innerText = Math.floor((diff / 1000) % 60).toString().padStart(2, '0');
            }

            const totalMs = targetDate - startDate;
            let percent = (((now - startDate) / totalMs) * 100).toFixed(1);
            if(percent > 100) percent = 100;
            els.progBar.style.width = percent + '%';
            els.progText.innerText = percent + '%';
        }

        function toggleTheme() {
            const isCurrentlyNight = document.body.classList.contains('night-mode');
            if (isCurrentlyNight) {
                manualThemeOverride = 'day';
                triggerToast('已为您切换至【白昼唯美海滩】模式 🌅');
            } else {
                manualThemeOverride = 'night';
                triggerToast('已为您切换至【璀璨星空烟花】模式 🌃');
            }
            updateTimeLoop();
        }

        function initStats() {
            const now = new Date();
            const diffDays = Math.floor((now - PROJECT_START_DATE) / 86400000);
            const fests = Math.floor(diffDays / 365 * 10); 
            
            animateValue("statDays", 0, diffDays, 2000);
            animateValue("statFests", 0, fests, 2000);

            setTimeout(() => {
                const maxDays = 5000; 
                document.getElementById('circleDays').style.strokeDashoffset = Math.max(0, 251 - (251 * (Math.min(diffDays, maxDays) / maxDays)));
                const maxFests = 150;
                document.getElementById('circleFests').style.strokeDashoffset = Math.max(0, 251 - (251 * (Math.min(fests, maxFests) / maxFests)));
            }, 100);
        }

        function animateValue(id, start, end, duration) {
            let startT = null;
            const step = (timestamp) => {
                if (!startT) startT = timestamp;
                const progress = Math.min((timestamp - startT) / duration, 1);
                const ease = 1 - Math.pow(1 - progress, 3);
                document.getElementById(id).innerText = Math.floor(ease * (end - start) + start);
                if (progress < 1) window.requestAnimationFrame(step);
            };
            window.requestAnimationFrame(step);
        }

        async function fetchJinanWeather() {
            try {
                const res = await fetch('https://wttr.in/Jinan?format=j1', { cache: "no-store" });
                if(!res.ok) throw new Error("Net Error");
                const data = await res.json();
                const curr = data.current_condition[0];
                updateWeatherUI(curr.temp_C, curr.lang_zh ? curr.lang_zh[0].value : curr.weatherDesc[0].value, curr.windspeedKmph, curr.humidity);
            } catch (err) {
                updateWeatherUI(15, "晴", "12", "45"); // 优雅降级兜底数据
            }
        }

        function updateWeatherUI(temp, desc, wind, hum) {
            document.getElementById('wtTemp').innerHTML = `${temp}<span>℃</span>`;
            document.getElementById('wtDesc').innerText = desc;
            document.getElementById('wtWind').innerText = `风力: ${wind}km/h`;
            document.getElementById('wtHum').innerText = `湿度: ${hum}%`;
            
            let aqiTxt = "良"; if(parseInt(hum) < 35) aqiTxt = "优";
            document.getElementById('wtAqi').innerText = `空气: ${aqiTxt}`;

            let advice = "今日气候适宜，陪伴舒心，平安健康。🌿";
            const tempVal = parseInt(temp);
            const windVal = parseInt(wind);
            const humVal = parseInt(hum);

            if (tempVal < 10) {
                advice = "❄️ 当前气温寒冷。天气凉，请提醒姥爷多加衣服保暖，尽量少外出吹冷风。";
            } else if (tempVal > 28) {
                advice = "☀️ 当前气温较高。天气炎热，注意防暑降温，多让姥爷喝点温水。";
            } else if (windVal > 28) {
                advice = "🍃 济南风力较大。减少推姥轮椅出门，在室内注意关好窗户，安全常在。";
            } else if (humVal < 40) {
                advice = "🍂 室内空气有些干燥。提醒姥爷多喝水滋润喉咙，注意保护呼吸道。";
            }
            document.getElementById('wtAdviceText').innerText = advice;
        }

        function generateTimeline() {
            const list = document.getElementById('timelineList'); let html = '';
            let cursor = Lunar.fromDate(new Date());
            if (cursor.getDay() !== 16) while (cursor.getDay() !== 16) cursor = cursor.next(-1);

            for (let i = 0; i < 24 && cursor.getSolar().getYear() <= 2030; i++) {
                const loc = getLocationByLunarMonth(cursor.getMonth());
                let nextCursor = cursor.next(1); while (nextCursor.getDay() !== 16) nextCursor = nextCursor.next(1);
                const s = cursor.getSolar(), e = nextCursor.getSolar();
                html += `<div class="timeline-item">
                            <div class="tl-text">
                                <div>农历 ${cursor.getMonthInChinese()}月十六 至 ${nextCursor.getMonthInChinese()}月十六</div>
                                <div class="tl-sub">阳历: ${s.getYear()}年${s.getMonth()}月${s.getDay()}日 — ${e.getMonth()}月${e.getDay()}日</div>
                            </div>
                            <div class="tl-loc ${loc === '我家' ? 'loc-myhome' : 'loc-yihome'}">${loc}</div>
                        </div>`;
                cursor = nextCursor;
            }
            list.innerHTML = html;
        }

        function generateHolidays() {
            const list = document.getElementById('holidayList'); let html = ''; let loopDate = new Date();
            const targetHolidays = ["春节", "除夕", "劳动节", "端午节", "中秋节", "国庆节", "元旦", "元宵节", "重阳节"];
            let foundCount = 0;
            while (loopDate.getFullYear() <= 2030 && foundCount < 35) { 
                let l = Lunar.fromDate(loopDate);
                let fests = [...l.getFestivals(), ...l.getSolar().getFestivals()];
                for(let fest of fests) {
                    if(targetHolidays.includes(fest)) {
                        let loc = getLocationForAnyDate(l);
                        html += `<div class="timeline-item">
                                    <div class="tl-text">
                                        <div><span style="color:var(--holiday-title); font-size:16px;">${fest}</span></div>
                                        <span class="tl-sub">${loopDate.getFullYear()}年${loopDate.getMonth()+1}月${loopDate.getDate()}日 (农历${l.getMonthInChinese()}月${l.getDayInChinese()})</span>
                                    </div>
                                    <div class="tl-loc ${loc === '我家' ? 'loc-myhome' : 'loc-yihome'}">在${loc}</div>
                                </div>`;
                        foundCount++; break; 
                    }
                }
                loopDate.setDate(loopDate.getDate() + 1);
            }
            list.innerHTML = html;
        }

        function saveDiary() {
            const input = document.getElementById('diaryInput');
            if(!input.value.trim()) return triggerToast('不能保存空白随笔哦');
            let diaries = JSON.parse(localStorage.getItem('family_diaries') || '[]');
            diaries.unshift({ date: new Date().toLocaleString(), content: input.value });
            localStorage.setItem('family_diaries', JSON.stringify(diaries));
            input.value = ''; renderDiary(); triggerToast('陪伴寄语已储存在本地 📔');
        }

        function renderDiary() {
            let diaries = JSON.parse(localStorage.getItem('family_diaries') || '[]');
            document.getElementById('diaryList').innerHTML = diaries.map(d => `
                <div class="diary-entry">
                    <div style="font-size:12px; color:var(--text-sub); margin-bottom:4px; font-weight:bold;">🕒 ${d.date}</div>
                    <div style="font-size:14px; line-height:1.5;">${d.content}</div>
                </div>`).join('');
        }

        function exportDiary() {
            let diaries = JSON.parse(localStorage.getItem('family_diaries') || '[]');
            if(diaries.length === 0) return triggerToast('当前没有可以导出的日记内容');
            let text = "=============================\n    【姥爷陪伴空间】随记备份    \n=============================\n\n";
            text += diaries.map(d => `时间: ${d.date}\n记录: ${d.content}\n-----------------------------\n`).join('');
            let blob = new Blob([text], {type: "text/plain;charset=utf-8"});
            let url = URL.createObjectURL(blob); let a = document.createElement('a');
            a.href = url; a.download = '姥爷陪伴空间_日记导出.txt';
            document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
            triggerToast('导出完成，请妥善保存文本文件 💾');
        }

        function toggleSection(cId, aId) {
            const c = document.getElementById(cId), a = document.getElementById(aId);
            if (c.classList.contains('expanded')) { c.classList.remove('expanded'); a.innerText = '▼'; } 
            else { c.classList.add('expanded'); a.innerText = '▲'; }
        }

        // =====================================
        // 音视频双向同步控制与黑胶旋转特效
        // =====================================
        let isPlaying = false;
        function toggleMusic() {
            const audio = document.getElementById('bgMusic');
            const floatingBtn = document.getElementById('musicFloatingBtn');
            const inlineBtn = document.getElementById('musicBtn');
            
            if (isPlaying) { 
                audio.pause(); 
                floatingBtn.classList.remove('music-playing'); 
                if(inlineBtn) inlineBtn.innerText = '🎵 播放音乐';
                isPlaying = false; 
            } else { 
                audio.play().then(() => { 
                    floatingBtn.classList.add('music-playing'); 
                    if(inlineBtn) inlineBtn.innerText = '⏸️ 暂停音乐';
                    isPlaying = true; 
                }).catch(() => triggerToast('请确保网络畅通，或点击页面任意位置后再播放')); 
            }
        }
        let tT; function triggerToast(msg) { const t = document.getElementById('toast'); t.innerText = msg; t.classList.add('show'); clearTimeout(tT); tT = setTimeout(()=>t.classList.remove('show'), 2500); }


        function generateShareCard() {
            const isDark = document.body.classList.contains('night-mode');
            const cardCvs = document.createElement('canvas');
            cardCvs.width = 460;
            cardCvs.height = 720;
            const c = cardCvs.getContext('2d');

            let bgGrad = c.createLinearGradient(0, 0, 0, 720);
            if (isDark) { bgGrad.addColorStop(0, '#0D111A'); bgGrad.addColorStop(1, '#1A1B2E'); } 
            else { bgGrad.addColorStop(0, '#76B4DF'); bgGrad.addColorStop(1, '#BFE2F2'); }
            c.fillStyle = bgGrad; c.fillRect(0, 0, 460, 720);

            function drawRoundRect(ctx, x, y, width, height, radius, fillStyle) {
                ctx.fillStyle = fillStyle;
                ctx.beginPath();
                ctx.moveTo(x + radius, y);
                ctx.lineTo(x + width - radius, y); ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
                ctx.lineTo(x + width, y + height - radius); ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
                ctx.lineTo(x + radius, y + height); ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
                ctx.lineTo(x, y + radius); ctx.quadraticCurveTo(x, y, x + radius, y);
                ctx.closePath(); ctx.fill();
            }

            const cardBg = isDark ? 'rgba(28, 33, 46, 0.9)' : 'rgba(255, 255, 255, 0.88)';
            drawRoundRect(c, 25, 30, 410, 660, 24, cardBg);

            const cMain = isDark ? '#FFFFFF' : '#0B2545';
            const cSub = isDark ? '#A1A1AA' : '#567189';
            const cAccent = '#E27B58';

            c.textAlign = 'center';
            c.fillStyle = cMain; c.font = 'bold 24px sans-serif';
            c.fillText('老 爷 陪 伴 空 间', 230, 80);

            c.strokeStyle = isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.06)';
            c.lineWidth = 1.5; c.beginPath(); c.moveTo(50, 105); c.lineTo(410, 105); c.stroke();

            c.fillStyle = cSub; c.font = '600 15px sans-serif';
            const dObj = new Date();
            const dateText = `${dObj.getFullYear()}年${dObj.getMonth()+1}月${dObj.getDate()}日`;
            const lunarText = document.getElementById('currentLunarText').innerText;
            c.fillText(`${dateText}   |   ${lunarText.replace('年 ', '')}`, 230, 138);

            const wtDesc = document.getElementById('wtDesc').innerText;
            const wtTemp = document.getElementById('wtTemp').innerText.replace('℃','') + '℃';
            c.fillStyle = cAccent; c.font = 'bold 15px sans-serif';
            c.fillText(`📍 济南实时气候：${wtDesc} ${wtTemp}`, 230, 175);

            const blockBg = isDark ? 'rgba(255,255,255,0.04)' : 'rgba(0,0,0,0.03)';
            drawRoundRect(c, 50, 205, 360, 85, 16, blockBg);
            c.fillStyle = cSub; c.font = '14px sans-serif';
            c.fillText('累 计 陪 伴 守 护', 230, 235);
            c.fillStyle = cAccent; c.font = 'bold 26px tabular-nums';
            c.fillText(`${document.getElementById('statDays').innerText} 天`, 230, 272);

            const key = getTodayKey();
            const mData = JSON.parse(localStorage.getItem('companion_mood_records') || '{}');
            const todayMood = mData[key] || '🕊 平安 (阖家顺遂)';
            c.fillStyle = cMain; c.font = '600 15px sans-serif';
            c.fillText(`今日打卡陪伴心情：${todayMood}`, 230, 335);

            drawRoundRect(c, 50, 375, 360, 175, 16, isDark ? 'rgba(255,255,255,0.02)' : 'rgba(226,123,88,0.05)');
            c.fillStyle = cAccent; c.font = 'bold 14px sans-serif';
            c.fillText('✍️ 今 日 陪 伴 语 录', 230, 412);

            c.fillStyle = cMain; c.font = '15px sans-serif';
            const currentQuote = document.getElementById('quoteText').innerText;
            
            let words = currentQuote.split(''); let line = ''; let yOffset = 455;
            for (let n = 0; n < words.length; n++) {
                let testLine = line + words[n];
                if (c.measureText(testLine).width > 310 && n > 0) {
                    c.fillText(line, 230, yOffset);
                    line = words[n]; yOffset += 24;
                } else { line = testLine; }
            }
            c.fillText(line, 230, yOffset);

            c.fillStyle = cSub; c.font = 'italic 14px sans-serif';
            c.fillText('— 时 光 温 柔 ， 陪 伴 常 在 —', 230, 655);

            const link = document.createElement('a');
            link.download = `陪伴卡片_${key}.png`;
            link.href = cardCvs.toDataURL("image/png");
            document.body.appendChild(link); link.click(); document.body.removeChild(link);
            triggerToast('已为您成功渲染并高速导出海报卡片 📸');
        }

        // ===================================================
        // 高度优化版：真实多层海浪与浪花体系 (纯 Canvas 重构)
        // ===================================================
        const cvs = document.getElementById('bgCanvas'); 
        const ctx = cvs.getContext('2d');
        let w, h, isNight = false; 
        
        function setCanvasTimeMode(n) { isNight = n; }
        function resize() { w = cvs.width = window.innerWidth; h = cvs.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        let mouseParticles = [];
        window.addEventListener('mousemove', (e) => {
            for(let i=0; i<2; i++) {
                mouseParticles.push({
                    x: e.clientX + (Math.random()-0.5)*12,
                    y: e.clientY + (Math.random()-0.5)*12,
                    size: Math.random() * 2 + 1,
                    vx: (Math.random()-0.5)*0.4,
                    vy: Math.random() * 1.2 + 0.4,
                    alpha: 1,
                    color: isNight ? '#FDE047' : '#FFFFFF'
                });
            }
        });

        class NightMeteor {
            constructor() { this.reset(); }
            reset() { this.x = Math.random()*w*1.5; this.y = -40; this.len = Math.random()*80+60; this.speed = Math.random()*2+1.5; this.alpha = Math.random()*0.4+0.1; }
            update() { this.x -= this.speed; this.y += this.speed; if(this.y > h + 80) this.reset(); }
            draw() {
                ctx.save(); ctx.beginPath(); ctx.moveTo(this.x, this.y); ctx.lineTo(this.x + this.len, this.y - this.len);
                let g = ctx.createLinearGradient(this.x, this.y, this.x + this.len, this.y - this.len);
                g.addColorStop(0, `rgba(255,255,255,${this.alpha})`); g.addColorStop(1, 'rgba(255,255,255,0)');
                ctx.strokeStyle = g; ctx.lineWidth = 1.2; ctx.stroke(); ctx.restore();
            }
        }

        class SparkFirework {
            constructor() { this.x = Math.random()*w; this.y = h; this.ty = h*0.15 + Math.random()*h*0.35; this.speed = 3.5+Math.random()*2; this.done = false; this.pts = []; }
            update() {
                if(!this.done) { this.y -= this.speed; if(this.y<=this.ty) { this.done=true; for(let i=0;i<30;i++){let a=Math.random()*Math.PI*2, s=Math.random()*2+0.4; this.pts.push({x:this.x,y:this.y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,a:1});}} }
                else { this.pts.forEach(p=>{p.x+=p.vx; p.y+=p.vy; p.vy+=0.03; p.a-=0.016;}); this.pts=this.pts.filter(p=>p.a>0); }
            }
            draw() {
                ctx.save();
                if(!this.done) { ctx.beginPath(); ctx.arc(this.x,this.y,1.5,0,Math.PI*2); ctx.fillStyle='#FFF'; ctx.fill(); }
                else { this.pts.forEach(p=>{ctx.globalAlpha=p.a; ctx.beginPath(); ctx.arc(p.x,p.y,1.2,0,Math.PI*2); ctx.fillStyle='#FBBF24'; ctx.fill();}); }
                ctx.restore();
            }
        }

        class AirVolumetricCloud {
            constructor(layer) { this.layer = layer; this.reset(true); }
            reset(randX = false) {
                this.scale = (Math.random() * 0.45 + 0.35) * (this.layer * 0.5 + 0.5);
                this.x = randX ? Math.random() * w : w + (200 * this.scale);
                this.y = Math.random() * (h * 0.4);
                this.speed = (0.12 * this.layer) + Math.random() * 0.08;
                this.opacity = this.layer === 3 ? 0.9 : (this.layer === 2 ? 0.6 : 0.35);
                this.puffs = [
                    {dx: 0, dy: 0, r: 42}, {dx: 30, dy: -22, r: 52},
                    {dx: 75, dy: -15, r: 46}, {dx: 110, dy: 12, r: 36}
                ];
            }
            update() { this.x -= this.speed; if(this.x < -240 * this.scale) this.reset(false); }
            draw() {
                ctx.save(); ctx.translate(this.x, this.y); ctx.scale(this.scale, this.scale); ctx.globalAlpha = this.opacity;
                ctx.filter = 'blur(13px)';
                ctx.fillStyle = 'rgba(154, 182, 212, 0.45)';
                this.puffs.forEach(p => { ctx.beginPath(); ctx.arc(p.dx, p.dy + 7, p.r, 0, Math.PI*2); ctx.fill(); });
                ctx.fillStyle = 'rgba(255, 255, 255, 0.98)';
                this.puffs.forEach(p => { ctx.beginPath(); ctx.arc(p.dx, p.dy, p.r, 0, Math.PI*2); ctx.fill(); });
                ctx.restore();
            }
        }

        // ================= 新增优化的核心波峰浪花粒子算法 =================
        class SplashParticle {
            constructor(x, y, isNightMode) {
                this.x = x + (Math.random() - 0.5) * 15;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 1.5;     
                this.vy = -Math.random() * 1.8 - 0.5; // 波峰爆裂向上抛出
                this.alpha = 1;
                this.decay = Math.random() * 0.02 + 0.01;
                this.size = Math.random() * 3 + 1;
                this.isNight = isNightMode;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.06; // 浪花抛出后由于重力回落
                this.alpha -= this.decay;
            }
            draw(c) {
                c.save();
                c.globalAlpha = Math.max(0, this.alpha);
                c.fillStyle = this.isNight ? 'rgba(156, 217, 255, 0.85)' : 'rgba(255, 255, 255, 0.95)';
                c.beginPath();
                c.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                c.fill();
                c.restore();
            }
        }

        let oceanTime = 0;
        let splashes = [];
        
        function renderOceanBeachWave() {
            oceanTime += 0.02;

            // 1. 真实沙滩渐变绘制 (带有水洗后的湿沙滩阴影)
            ctx.save();
            let sandGrad = ctx.createLinearGradient(0, h - 120, 0, h);
            if (isNight) {
                sandGrad.addColorStop(0, '#2C3A47'); sandGrad.addColorStop(1, '#1A252F');
            } else {
                sandGrad.addColorStop(0, '#E6C6A2'); sandGrad.addColorStop(0.4, '#D4B38A'); sandGrad.addColorStop(1, '#A6845B');
            }
            ctx.fillStyle = sandGrad;
            ctx.beginPath(); ctx.moveTo(0, h); ctx.lineTo(0, h - 80);
            ctx.bezierCurveTo(w * 0.3, h - 100, w * 0.7, h - 60, w, h - 90);
            ctx.lineTo(w, h); ctx.fill(); ctx.restore();

            // 潮汐推拉变量，让海浪有整体的进退感
            let tide = Math.sin(oceanTime * 0.6) * 12;

            // 2. 动态多重交叠海浪层配置
            let waveLayers = [];
            if (isNight) {
                waveLayers = [
                    { color: 'rgba(21, 32, 54, 0.6)', amp: 12, freq: 0.005, speed: 0.8, height: 95 + tide*0.5, phase: 0 },
                    { color: 'rgba(32, 45, 74, 0.7)', amp: 16, freq: 0.007, speed: 1.1, height: 70 + tide*0.8, phase: 1 },
                    { color: 'rgba(50, 70, 100, 0.8)', amp: 20, freq: 0.004, speed: 1.4, height: 45 + tide, phase: 2 }
                ];
            } else if (currentTheme === 'spring') {
                waveLayers = [
                    { color: 'rgba(94, 20, 20, 0.5)', amp: 12, freq: 0.005, speed: 0.8, height: 95 + tide*0.5, phase: 0 },
                    { color: 'rgba(139, 35, 35, 0.6)', amp: 16, freq: 0.007, speed: 1.1, height: 70 + tide*0.8, phase: 1 },
                    { color: 'rgba(180, 50, 50, 0.8)', amp: 20, freq: 0.004, speed: 1.4, height: 45 + tide, phase: 2 }
                ];
            } else {
                waveLayers = [
                    { color: 'rgba(70, 130, 180, 0.4)', amp: 14, freq: 0.005, speed: 0.8, height: 95 + tide*0.5, phase: 0 },
                    { color: 'rgba(135, 206, 235, 0.6)', amp: 18, freq: 0.008, speed: 1.1, height: 70 + tide*0.8, phase: 1 },
                    { color: 'rgba(255, 255, 255, 0.6)', amp: 22, freq: 0.006, speed: 1.5, height: 45 + tide, phase: 2 }
                ];
            }

            // 3. 渲染波浪并抛射浪花
            waveLayers.forEach((wave, idx) => {
                ctx.beginPath();
                ctx.moveTo(0, h);
                let baseY = h - wave.height;
                
                for (let x = 0; x <= w; x += 10) {
                    // 主正弦波配合高频碎波增加流体褶皱的真实感
                    let mainWave = Math.sin(x * wave.freq + oceanTime * wave.speed + wave.phase);
                    let subWave = Math.sin(x * wave.freq * 2.5 + oceanTime * wave.speed * 1.5) * 0.2;
                    let y = baseY + (mainWave + subWave) * wave.amp;
                    
                    ctx.lineTo(x, y);
                    
                    // 当处于最前方的白沫层 (idx === 2) 且达到浪尖极值时抛射浪花
                    if (idx === 2 && Math.random() < 0.15) {
                        if (mainWave < -0.6) { // 视觉最高波峰
                            splashes.push(new SplashParticle(x, y, isNight));
                        }
                    }
                }
                ctx.lineTo(w, h);
                ctx.closePath();
                ctx.fillStyle = wave.color;
                ctx.fill();

                // 强化最前层白浪的视觉张力边界
                if (idx === 2) {
                    ctx.lineWidth = 3;
                    ctx.strokeStyle = isNight ? 'rgba(156, 217, 255, 0.4)' : 'rgba(255,255,255,0.9)';
                    ctx.stroke();
                }
            });

            // 4. 沙滩上的长效残留泡沫渲染
            ctx.fillStyle = isNight ? 'rgba(156, 217, 255, 0.3)' : 'rgba(255,255,255,0.6)';
            for(let i = 0; i < 20; i++) {
                let fx = (oceanTime * 30 + i * (w/20)) % w;
                let fy = h - 35 + tide + Math.sin(fx * 0.02 + oceanTime) * 12;
                ctx.beginPath(); ctx.arc(fx, fy, Math.random() * 2 + 1, 0, Math.PI * 2); ctx.fill();
            }

            // 5. 更新及渲染抛射出的细密小水珠浪花
            for (let i = splashes.length - 1; i >= 0; i--) {
                splashes[i].update();
                splashes[i].draw(ctx);
                if (splashes[i].alpha <= 0) splashes.splice(i, 1);
            }
        }

        let nightMeteors = []; for(let i=0; i<4; i++) nightMeteors.push(new NightMeteor());
        let nightFireworks = [];
        let dayAirClouds = []; for(let i=0; i<10; i++) dayAirClouds.push(new AirVolumetricCloud((i % 3) + 1));

        function animateFrameLoop() {
            ctx.clearRect(0, 0, w, h);
            
            if (isNight) {
                nightMeteors.forEach(m => { m.update(); m.draw(); });
                if (Math.random() < 0.012 && nightFireworks.length < 3) nightFireworks.push(new SparkFirework());
                nightFireworks.forEach(f => { f.update(); f.draw(); });
                nightFireworks = nightFireworks.filter(f => !(f.done && f.pts.length === 0));
            } else {
                dayAirClouds.forEach(c => { c.update(); c.draw(); });
            }

            // 海浪与沙滩 (黑夜白昼都有，自动适配色彩)
            renderOceanBeachWave();

            mouseParticles.forEach(p => {
                p.x += p.vx; p.y += p.vy; p.alpha -= 0.024; p.size *= 0.96;
                ctx.save(); ctx.globalAlpha = Math.max(0, p.alpha); ctx.fillStyle = p.color;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill(); ctx.restore();
            });
            mouseParticles = mouseParticles.filter(p => p.alpha > 0);

            requestAnimationFrame(animateFrameLoop);
        }
        
        animateFrameLoop();
        bootSystem();
    </script>
</body>
